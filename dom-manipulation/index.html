<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Quote Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Dynamic Quote Generator</h1>
        <div id="thought"></div>
        <button id="previousthought">Previous Quote</button>
        <button id="nextthought">Next Quote</button>
        <input id="inputsearch" type="number" placeholder="Enter quote number">
        <button id="searchbtn">Search</button>
        <p id="countnum">0</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
